<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeardVpn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="BeardVpn" width="40" height="40" style="border-radius: 8px;">
        <span class="logo-text">BeardVpn</span>
      </div>
      <div class="premium-badge" id="premiumBadge">
        <span id="premiumText">FREE</span>
      </div>
    </div>

    <!-- Status -->
    <div class="status-section">
      <div class="status-text" id="statusText">Disconnected</div>
      <div class="connection-time" id="connectionTime"></div>
    </div>

    <!-- Connect Button -->
    <div class="connect-container">
      <button class="connect-btn" id="connectBtn">
        <div class="power-icon">
          <svg viewBox="0 0 24 24" width="48" height="48">
            <path d="M12 2v10M18.36 6.64A9 9 0 1 1 5.64 6.64" 
                  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </button>
      <div class="connect-label" id="connectLabel">Connect</div>
    </div>

    <!-- Server Info -->
    <div class="server-section">
      <div class="current-server">
        <span class="server-flag" id="serverFlag">🌍</span>
        <span class="server-name" id="serverName">Select a server</span>
      </div>
      <button class="change-server-btn" id="changeServerBtn">Change</button>
    </div>

    <!-- Data Stats -->
    <div class="stats-section">
      <div class="stat">
        <div class="stat-label">Upload</div>
        <div class="stat-value" id="dataUp">0 B</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-label">Download</div>
        <div class="stat-value" id="dataDown">0 B</div>
      </div>
    </div>

    <!-- Quick Server List -->
    <div class="server-list-section" id="serverListSection" style="display: none;">
      <div class="server-list-header">
        <span>Servers</span>
        <button class="refresh-btn" id="refreshBtn">↻</button>
      </div>
      <div class="server-list" id="serverList"></div>
    </div>

    <!-- Ad Banner Slot -->
    <div class="ad-banner" id="adBanner"></div>

    <!-- Premium Dialog -->
    <div class="premium-dialog" id="premiumDialog" style="display: none;">
      <div class="premium-content">
        <h3>Premium Server</h3>
        <p>This is a premium server. Watch a short ad to unlock for 30 minutes.</p>
        <div class="premium-timer" id="premiumTimer" style="display: none;">
          <div class="timer-circle">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="timer-bg"/>
              <circle cx="50" cy="50" r="45" class="timer-progress" id="timerProgress"/>
            </svg>
            <span class="timer-text" id="timerText">5</span>
          </div>
        </div>
        <div class="premium-buttons">
          <button class="btn-premium" id="watchAdBtn">Watch Ad</button>
          <button class="btn-cancel" id="cancelPremiumBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

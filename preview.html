<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BeardVpn Live Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#090d16;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;color:#f8fafc;max-width:414px;margin:0 auto;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:32px;height:32px;border-radius:8px;background:#131b2e;display:flex;align-items:center;justify-content:center;font-size:20px}
.header-title{font-size:20px;font-weight:800;letter-spacing:0.5px;color:#f8fafc}
.status-pill{display:inline-flex;align-items:center;gap:6px;background:#131b2e;border:1px solid #1e293b;padding:6px 12px;border-radius:20px}
.status-pill.connected{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3)}
.status-pill-dot{width:7px;height:7px;border-radius:3.5px;background:#64748b}
.status-pill.connected .status-pill-dot{background:#4ade80}
.status-pill.connecting .status-pill-dot{background:#facc15}
.status-pill-text{font-size:11px;font-weight:800;letter-spacing:1px;color:#64748b}
.status-pill.connected .status-pill-text{color:#4ade80}
.status-pill.connecting .status-pill-text{color:#facc15}

/* Hero Section */
.hero{text-align:center;padding:16px 0 20px}

/* Button Wrapper - 100% Centered Container */
.btn-wrap{position:relative;width:190px;height:190px;margin:0 auto;display:flex;align-items:center;justify-content:center}

.aura-ring{position:absolute;top:0;left:0;width:190px;height:190px;border-radius:50%;background:#3b82f6;opacity:0.12;pointer-events:none}
.aura-ring.connected{background:#22c55e;opacity:0.25;animation:pulseAura 2s ease-in-out infinite}
@keyframes pulseAura{0%,100%{transform:scale(1);opacity:0.2}50%{transform:scale(1.1);opacity:0.45}}

.btn-circle{width:150px;height:150px;border-radius:50%;border:4px solid #3b82f6;background:#0b1329;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;position:relative;z-index:2;box-shadow:0 0 24px rgba(59,130,246,0.35)}
.btn-circle:active{transform:scale(0.94)}
.btn-circle.connected{border-color:#22c55e;background:#052e16;box-shadow:0 0 28px rgba(34,197,94,0.45)}
.btn-circle.connecting{border-color:#eab308;background:#1c1917}

.pwr-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:4px}
.pwr-ring{width:36px;height:36px;border-radius:50%;border:3.5px solid #60a5fa;border-top-color:transparent}
.pwr-bar{position:absolute;top:3px;width:3.5px;height:15px;background:#60a5fa;border-radius:2px}
.connected .pwr-ring{border-color:#4ade80;border-top-color:transparent}
.connected .pwr-bar{background:#4ade80}

.spin-ring{width:44px;height:44px;border:3.5px solid rgba(234,179,8,0.2);border-top-color:#facc15;border-right-color:#facc15;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-txt{font-size:12px;font-weight:800;letter-spacing:2px;color:#60a5fa}
.connected .btn-txt{color:#4ade80}
.connecting .btn-txt{color:#facc15;font-size:10px}

.status-title{font-size:18px;font-weight:700;color:#f8fafc;margin-top:20px;text-align:center}
.status-sub{font-size:12px;font-weight:600;color:#64748b;margin-top:4px;text-align:center}
.status-sub.connected{color:#4ade80}
.status-sub.connecting{color:#facc15}
.host-tag{font-size:11px;font-family:'SF Mono','Menlo',monospace;color:#64748b;margin-top:4px;text-align:center}

/* Speed Stats Cards */
.speed-grid{display:flex;gap:12px;margin:0 20px 20px}
.speed-box{flex:1;background:#131b2e;border-radius:16px;padding:14px;border:1px solid #1e293b}
.speed-lbl{color:#64748b;font-size:10px;font-weight:700;letter-spacing:1.2px}
.speed-val{color:#4ade80;font-size:18px;font-weight:700;font-family:'SF Mono','Menlo',monospace;margin-top:4px}
.speed-val.ul{color:#60a5fa}

/* Cards Section */
.sec-wrap{margin:0 20px 20px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.sec-title{color:#64748b;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.sec-link{color:#60a5fa;font-size:12px;font-weight:600;cursor:pointer}

/* Server Card */
.srv-card{display:flex;align-items:center;padding:12px 14px;margin-bottom:8px;border-radius:14px;border:1px solid #1e293b;background:#131b2e;cursor:pointer;transition:all 0.15s}
.srv-card:active{opacity:0.8}
.srv-card.sel{background:rgba(30,58,138,0.45);border-color:#3b82f6}
.srv-card .flag{font-size:26px;margin-right:12px}
.srv-card .info{flex:1;margin-right:8px}
.srv-card .cntry-row{display:flex;align-items:center;gap:6px}
.srv-card .cntry-name{color:#f8fafc;font-size:15px;font-weight:700}
.badge-free{background:rgba(34,197,94,0.15);color:#4ade80;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px}
.badge-check{width:16px;height:16px;border-radius:8px;background:#3b82f6;color:#fff;font-size:10px;font-weight:bold;display:inline-flex;align-items:center;justify-content:center}
.srv-card .hostline{color:#64748b;font-size:12px;margin-top:2px}
.srv-card .stats{text-align:right}
.srv-card .spd{font-size:12px;font-weight:700;font-family:'SF Mono','Menlo',monospace;color:#4ade80}
.srv-card .png{font-size:11px;font-family:'SF Mono','Menlo',monospace;color:#4ade80;margin-top:2px}

/* Controls Footer */
.controls{position:fixed;bottom:0;left:0;right:0;max-width:414px;margin:0 auto;background:#131b2e;border-top:1px solid #1e293b;padding:8px 12px 12px;z-index:100}
.ctrl-lbl{text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.ctrl-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.cb{background:#0b1329;border:1px solid #1e293b;color:#94a3b8;padding:6px 12px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;transition:all 0.15s}
.cb.on{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.scroll-pad{padding-bottom:90px}
</style>
</head>
<body>
<div id="app"></div>
<div class="controls">
  <div class="ctrl-lbl">BEARDVPN PREVIEW — TAP STATE TO TEST UI</div>
  <div class="ctrl-row">
    <button class="cb" id="btn-idle" onclick="setState('idle')">IDLE</button>
    <button class="cb" id="btn-connecting" onclick="setState('connecting')">CONNECTING</button>
    <button class="cb" id="btn-connected" onclick="setState('connected')">CONNECTED</button>
    <button class="cb" id="btn-error" onclick="setState('error')">ERROR</button>
  </div>
</div>

<script>
const SRV=[
  {cl:'Japan',cs:'JP',ip:'103.152.220.61',hn:'pubproxy.com',op:'VPNGate',sp:14680064,pi:42,free:1},
  {cl:'Germany',cs:'DE',ip:'185.216.69.171',hn:'kazuhitoyamashita.com',op:'VPNGate',sp:8388608,pi:88,free:1},
  {cl:'United States',cs:'US',ip:'216.155.139.117',hn:'us1.vpngate.net',op:'VPNGate',sp:6291456,pi:120,free:1},
  {cl:'South Korea',cs:'KR',ip:'121.78.245.144',hn:'korea2.vpngate.net',op:'VPNGate',sp:5242880,pi:156,free:1},
];
const FLAGS={JP:'🇯🇵',US:'🇺🇸',KR:'🇰🇷',SG:'🇸🇬',DE:'🇩🇪'};

function fmtSpd(b){if(!b||b===0)return'0 B';if(b>=1048576)return(b/1048576).toFixed(1)+' MB';if(b>=1024)return(b/1024).toFixed(1)+' KB';return b+' B'}

let state='idle', sel=0, bytesIn=0, bytesOut=0, speedTimer=null;

function animSpeed(){
  if(speedTimer)clearInterval(speedTimer);
  if(state==='connected'){
    bytesIn=14680064;bytesOut=2097152;
    speedTimer=setInterval(()=>{
      bytesIn+=Math.floor(Math.random()*200000)+50000;
      bytesOut+=Math.floor(Math.random()*80000)+10000;
      const el=document.getElementById('dl');
      const eu=document.getElementById('ul');
      if(el)el.textContent=fmtSpd(bytesIn);
      if(eu)eu.textContent=fmtSpd(bytesOut);
    },1000);
  }
}

function render(){
  const I=state==='connected',C=state==='connecting',E=state==='error';
  const sc=I?'#4ade80':C?'#facc15':E?'#f87171':'#64748b';
  const st=I?'Protected & Encrypted':C?'Establishing Connection...':E?'Connection Failed':'Not Connected';
  const ss=I?'Your network traffic is secured':C?'Routing tunnel through OpenVPN':E?'Tap to retry or pick another server':'Tap button to secure your device';

  ['idle','connecting','connected','error'].forEach(s=>{
    const b=document.getElementById('btn-'+s);
    if(b)b.className='cb'+(state===s?' on':'');
  });

  let btn;
  if(C){
    btn=`<div class="btn-wrap"><div class="btn-circle connecting"><div class="spin-ring"></div><div class="btn-txt">CONNECTING</div></div></div>`;
  }else if(I){
    btn=`<div class="btn-wrap"><div class="aura-ring connected"></div><div class="btn-circle connected" onclick="doDisconnect()"><div class="pwr-icon"><div class="pwr-ring"></div><div class="pwr-bar"></div></div><div class="btn-txt">DISCONNECT</div></div></div>`;
  }else{
    btn=`<div class="btn-wrap"><div class="aura-ring"></div><div class="btn-circle" onclick="doConnect()"><div class="pwr-icon"><div class="pwr-ring"></div><div class="pwr-bar"></div></div><div class="btn-txt">CONNECT</div></div></div>`;
  }

  let sub=`<div class="status-title">${st}</div><div class="status-sub ${state}">${ss}</div>`;
  if(I){
    const s=SRV[sel];
    sub+=`<div class="host-tag">${s.cl} • ${s.ip}</div>`;
  }

  let speed='';
  if(I){
    speed=`<div class="speed-grid"><div class="speed-box"><div class="speed-lbl">DOWNLOAD</div><div class="speed-val" id="dl">14.0 MB</div></div><div class="speed-box"><div class="speed-lbl">UPLOAD</div><div class="speed-val ul" id="ul">2.0 MB</div></div></div>`;
  }

  const s=SRV[sel];
  let srvSec=`<div class="sec-wrap"><div class="sec-head"><span class="sec-title">Selected Server</span><span class="sec-link">Change Server ›</span></div>${card(s,true)}</div>`;

  let top=`<div class="sec-wrap"><div class="sec-head"><span class="sec-title">Recommended Fast Servers</span><span class="sec-link">View All (${SRV.length}) ›</span></div>${SRV.map((s,i)=>card(s,i===sel)).join('')}</div>`;

  document.getElementById('app').innerHTML=`<div class="scroll-pad">
    <div class="header">
      <div class="brand">
        <div class="brand-logo">🛡️</div>
        <span class="header-title">BeardVpn</span>
      </div>
      <div class="status-pill ${state}">
        <div class="status-pill-dot"></div>
        <span class="status-pill-text">${I?'CONNECTED':C?'CONNECTING':'IDLE'}</span>
      </div>
    </div>
    <div class="hero">${btn}${sub}</div>
    ${speed}${srvSec}${top}</div>`;

  if(I)animSpeed();
}

function card(s,isSel){
  const f=FLAGS[s.cs]||'🌐';
  return `<div class="srv-card${isSel?' sel':''}" onclick="pickServer(${SRV.indexOf(s)})"><span class="flag">${f}</span><div class="info"><div class="cntry-row"><span class="cntry-name">${s.cl}</span><span class="badge-free">FREE</span>${isSel?'<span class="badge-check">✓</span>':''}</div><div class="hostline">${s.hn} • ${s.op}</div></div><div class="stats"><div class="spd">${fmtSpd(s.sp)}</div><div class="png">${s.pi} ms</div></div></div>`;
}

function pickServer(i){sel=i;render()}
function setState(s){state=s;render()}
function doConnect(){state='connecting';render();setTimeout(()=>{state='connected';render()},1500)}
function doDisconnect(){state='idle';render()}

render();
</script>
</body>
</html>
